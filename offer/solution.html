    function submitApplication() {
      hideModal();
      window.open(googleFormUrl, '_blank');

    function calculateFee() {
      const input = document.getElementById('amount-input');
      if (!input) return;
      let amount = parseFloat(input.value) || 1000;
      const rate = fees[currentTab];
      const fee = (amount * rate / 100);
      const total = amount + fee;

      document.getElementById('base-amount').textContent = '₹' + amount.toFixed(2);
      document.getElementById('fee-amount').textContent = '₹' + fee.toFixed(2);
      document.getElementById('total-amount').textContent = '₹' + total.toFixed(2);
    }

    function hideModal() {
      const modal = document.getElementById('modal');
      modal.classList.remove('show');
    }

    function toggleTheme() {
      isDarkMode = !isDarkMode;
      if (isDarkMode) {
        document.body.classList.remove('light');
        document.getElementById('theme-icon').classList.replace('fa-sun', 'fa-moon');
      } else {
        document.body.classList.add('light');
        document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
      }
    }
