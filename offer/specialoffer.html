<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>BS&MFI | Special offer</title>
      <link rel="icon" href="mfi.logo.png"/>
      <style>
         @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Orbitron:wght@400..900&family=Red+Hat+Display:ital,wght@0,300..900&family=Strait&display=swap');
         * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Red Hat Display", sans-serif;	scrollbar-width: none;
         }

         body {
            background:black;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
            font-weight: 600;
            line-height: 40px;
            background-repeat: no-repeat;
         }

         * {
            -webkit-tap-highlight-color: transparent;
         }

         body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
         }

         .offer-container {
            width: 100%;
            border-radius: 12px;
            text-align: center;
            padding: 50px 0px;
            display: none;
            max-width: 650px;
         }

         .offer-title {
            color: #ffffff;
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 25px;
            letter-spacing: 1px;
            font-style: italic;
         }

         .offer-details {
            text-align: left;
            padding: 0 20px;
         }

         .highlight {
          color: #ffca00;
    font-weight: 700;
    white-space: nowrap;
    text-decoration: underline;
    text-transform: capitalize;
         }

         .highlight:hover {
            cursor: pointer;
     color: #00e4ff;
         }

         .fee-list {
            list-style-type: none;
            padding-left: 0;
         }

         .fee-list li {
            margin: 10px 0 40px 0;
         }

         .fee-list ul {
            list-style-type: disc;
            padding-left: 20px;
         }

         .button {
            background-color: white;
            color: black;
            padding: 8px 20px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: background-color 0.3s ease;
            border: none;
            border-radius: 50px;
            cursor: pointer;
         }

         .button:hover {
            background-color: #ffffff45;color: rgb(255, 255, 255);
         }

         .button.disabled {
            background-color: #cccccc;
            color: #666666;
            cursor: not-allowed;
            pointer-events: none;
         }
.gradient-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }

      .gradient-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.5;
        animation: float-orb 20s ease-in-out infinite;
      }

      .orb-1 {
       width: 500px;
    height: 300px;
        background: linear-gradient(135deg, #002eff 0%, #ff009e 100%);
        top: -100px;
        right: -200px;
        animation-delay: 0s;
      }

      .orb-2 {
        width: 300px;
        height: 300px;
        background: linear-gradient(135deg, #fff500 0%, #ff009e 100%);
        bottom: -100px;
        left: -150px;
        animation-delay: -5s;
      }
.header-badge {
        display: flex;
    justify-content: center;
    padding: 0px 0px 20px 0;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 0px 25px;
        border-radius: 100px;
        font-size: 15px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.9);
      }

      .badge .live-dot {
        width: 8px;
        height: 8px;
        background: #00ffbf;
        border-radius: 50%;
        animation: pulse-dot 2s ease-in-out infinite;
        box-shadow: 0 0 20px #00ffbf;
      }

      @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(0.8); }
      }

      .orb-3 {
       width: 400px;
    height: 400px;
    background: linear-gradient(135deg, #ff0000 0%, #a700ff 100%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation-delay: -10s;
      }

      @keyframes float-orb {
        0%, 100% {
          transform: translate(0, 0) scale(1);
        }
        25% {
          transform: translate(30px, -30px) scale(1.05);
        }
        50% {
          transform: translate(-20px, 20px) scale(0.95);
        }
        75% {
          transform: translate(-30px, -20px) scale(1.02);
        }
      }
         .disclaimer {
            font-size: 12px;
            color: #ffffff;
            margin-top: 15px;
            font-style: italic;
         }

         a {
            text-decoration: none;
            color: white;
         }

         hr {
            background: linear-gradient(45deg, transparent, #ffffff70, transparent);
    height: 2px;
    border: none;
    margin: 40px 0px;
         }

         .interest-calculator {
             text-align: center;
    padding: 15px 15px 5px 15px;
    border-radius: 45px;
    margin: 21px 5px -25px 5px;
    color: white;
    background: #ffffff1a;
    backdrop-filter: blur(10px);
    border: 1px solid rgb(255 255 255 / 14%);
         }

         .interest-calculator input {
               padding: 15px;
    font-size: 16px;
    border: none;
    background: #ffffff00;
    color: #ffffff;
    width: 80%;
    outline: none;
    text-align: center;
    border-bottom: solid 1.5px #ffffff7a;
    margin-bottom: 20px;

         }

         .interest-result {
             font-size: 15px;
    padding: 15px;
    border-radius: 30px;
    margin: 18px 5px;
    color: #00e4ff;
    text-align: center;
    backdrop-filter: blur(10px);
    border: 1px solid rgb(255 255 255 / 14%);
         }

         ::placeholder {
            color: rgba(255, 255, 255, 0.742);
         }

         .expired-message {
            color: #ff0000;
            font-weight: 600;
            margin-top: 10px;
            font-size: 14px;
         }

         label {
           color: white;
    background: #ffffff13;
    backdrop-filter: blur(10px);
    border: 1px solid rgb(255 255 255 / 14%);
    padding: 6px 20px;
    border-radius: 100px;
    font-size: 14px;
         }

         .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #2c2c2c;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 400;
            text-align: center;
            z-index: 1000;
            flex-direction: column;
            line-height: 11px;
            letter-spacing: 0.5px;
            font-size: 11px;
         }
         html {
  scroll-behavior: smooth;
}
      </style>
   </head>
   <body>
      <div class="container">
      <div class="popup" id="popup">
         <span style="color: #00beff; margin: 10px;">No offer available by</span>
         <span style="font-size: 40px; font-weight: 800; font-style: oblique;">ProgramX</span>
         <span style="color: #00beff; margin: 15px 0px 0px 35px;">currently</span>
         <powerbybs style="position: fixed; bottom: 20px;">Powered by BS&MFI Programs</powerbybs>
      </div>
   </body>
</html>
