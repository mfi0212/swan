.grid{
max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px 30px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 10px;
}

    .floating-eggs {
      position: absolute;
      font-size: 2.5rem;
      animation: float 6s infinite ease-in-out;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(15deg); }
    }
.house{
  cursor:pointer;
}

.house img{
width: 100%;
    height: 330px;
    object-fit: cover;
    transition: transform .4s ease;
    border-radius: 35px;
    filter: saturate(2);
}

.house:hover img{
  transform:scale(1.03);
}
.modal p {
    text-align: center;
    font-size: 13px;
    margin-bottom: -15px;
}
.house span{
display: block;
    margin: 12px;
    font-size: 11px;
    letter-spacing: 0.5px;
    text-align: center;
    text-decoration: underline 1px gray;
    text-underline-position: under;
    text-transform: uppercase;
}

/* Modal */
.overlay{
 position: fixed;
    inset: 0;
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 100000;
}

.modal{
background: #00000026;
    width: 95%;
    max-width: 520px;
    padding: 20px;
    text-align: center;
    filter: saturate(3);
    animation: rise .4s ease;
    backdrop-filter: blur(35px);
    border-radius: 40px;
    margin-bottom: 14px;
    box-shadow: -0px -35px 1px 1000px #000000b3;
    color: white;
    border: solid 1.5px #ffffff57;
}

@keyframes rise{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.modal h2{
   font-family: 'Playfair Display', serif;
      font-weight: 400;
  font-size:28px;
  margin-bottom:25px;
}

.detail{
border-bottom: 1px solid #0000001a;
